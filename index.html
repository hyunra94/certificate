<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수료증 조회</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background: #f5f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px 20px 100px 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 32px; line-height: 1.5; }
    label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    button {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 8px;
    }
    button:hover  { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .privacy-notice {
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
    #result { margin-top: 24px; }
    .success {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .cert-card {
      padding: 16px 0;
      border-bottom: 1px solid #d1fae5;
    }
    .cert-card:first-child { padding-top: 0; }
    .cert-card:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .cert-course { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .cert-date   { font-size: 13px; color: #666; margin-bottom: 16px; }
    .download-btn {
      display: inline-block;
      padding: 10px 28px;
      background: #16a34a;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .error {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 12px;
      padding: 16px;
      color: #dc2626;
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }
    .loading { text-align: center; color: #888; font-size: 14px; padding: 16px; }
    .contact-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 12px 20px;
      text-align: center;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      z-index: 100;
    }
    .contact-bar p {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .contact-links {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .contact-btn:hover { opacity: 0.8; }
    .contact-btn.phone { background: #f0f4ff; color: #4f46e5; }
    .contact-btn.kakao { background: #fef08a; color: #713f12; }
  </style>
</head>
<body>

<div class="card">
  <h1>📄 수료증 조회</h1>
  <p class="sub">이름과 생년월일을 입력하면<br>수료증을 다운로드할 수 있습니다.</p>

  <label>이름</label>
  <input type="text" id="name" placeholder="홍길동" maxlength="10" autocomplete="off">

  <label>생년월일</label>
  <input type="text" id="birth" placeholder="900101 (숫자 6자리)" maxlength="6"
         inputmode="numeric" autocomplete="off">

  <button id="searchBtn" onclick="search()">조회하기</button>
  <p class="privacy-notice">🔒 입력하신 정보는 저장되지 않습니다.</p>

  <div id="result"></div>
</div>

<div class="contact-bar">
  <p>시스템 오류 또는 수료증 이상 시 문의해 주세요.</p>
  <div class="contact-links">
    <a class="contact-btn phone" href="tel:0632208214">
      📞 063-220-8214~6
    </a>
    <a class="contact-btn kakao" href="https://m.site.naver.com/1DNYL" target="_blank" rel="noopener">
      💬 카카오톡 문의
    </a>
  </div>
</div>

<script>
  const WORKER_URL = 'https://certificate-api.abyss9405.workers.dev/';

  const attempts = [];
  function isRateLimited() {
    const now = Date.now();
    const recent = attempts.filter(t => now - t < 60000);
    attempts.length = 0;
    recent.forEach(t => attempts.push(t));
    if (recent.length >= 5) return true;
    attempts.push(now);
    return false;
  }

  async function search() {
    const name   = document.getElementById('name').value.trim();
    const birth  = document.getElementById('birth').value.trim();
    const result = document.getElementById('result');
    const btn    = document.getElementById('searchBtn');

    if (!name || birth.length !== 6) {
      result.innerHTML = '<div class="error">이름과 생년월일 6자리를 입력해주세요.</div>';
      return;
    }

    if (isRateLimited()) {
      result.innerHTML = '<div class="error">잠시 후 다시 시도해주세요.<br>(1분에 최대 5회 조회 가능)</div>';
      return;
    }

    btn.disabled = true;
    btn.textContent = '조회 중...';
    result.innerHTML = '<div class="loading">🔍 조회 중입니다...</div>';

    try {
      const res  = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, birth })
      });

      const data = await res.json();

      if (data.found) {
        const cards = data.certs.map(cert => `
          <div class="cert-card">
            <div class="cert-course">🎓 ${cert.course}</div>
            <div class="cert-date">수료일: ${cert.date}</div>
            <a class="download-btn" href="${cert.certUrl}" target="_blank" rel="noopener">
              📥 수료증 다운로드
            </a>
          </div>
        `).join('');

        result.innerHTML = `<div class="success">${cards}</div>`;
      } else {
        result.innerHTML = `
          <div class="error">
            수료증 정보를 찾을 수 없습니다.<br>
            이름 또는 생년월일을 다시 확인해주세요.
          </div>`;
      }

    } catch {
      result.innerHTML = '<div class="error">오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>';
    }

    btn.disabled = false;
    btn.textContent = '조회하기';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>
</body>
</html>
